name: Cache Dependencies Example

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 1: Cache dependencies
    - name: prime-cache-51da18d
      id: cache-step
      uses: actions/cache@v4
      with:
        path: |
          node_modules   # or your dependency folder
        key: cache-51da18d

    # Step 2: Show if cache was hit or missed
    - name: Echo cache status
      run: echo "Cache hit: ${{ steps.cache-step.outputs.cache-hit }}"
